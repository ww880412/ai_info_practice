services:
  postgres:
    image: postgres:15-alpine
    container_name: ai-practice-postgres
    ports:
      - "5433:5432"
    environment:
      POSTGRES_DB: ai_practice
      POSTGRES_USER: ai_practice
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-practice123}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ai_practice"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ai-practice-app
    ports:
      - "3001:3001"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      DATABASE_URL: postgresql://ai_practice:${POSTGRES_PASSWORD:-practice123}@postgres:5432/ai_practice?schema=public
      GEMINI_API_KEY: ${GEMINI_API_KEY}
      GEMINI_MODEL: ${GEMINI_MODEL:-gemini-3-flash-preview}
      INNGEST_DEV: ${INNGEST_DEV:-http://inngest:8288}
      INNGEST_EVENT_KEY: ${INNGEST_EVENT_KEY}
      INNGEST_SIGNING_KEY: ${INNGEST_SIGNING_KEY}
      NEXT_PUBLIC_APP_URL: http://localhost:3001
      KEY_ENCRYPTION_SECRET: ${KEY_ENCRYPTION_SECRET}
      R2_ACCOUNT_ID: ${R2_ACCOUNT_ID}
      R2_ACCESS_KEY_ID: ${R2_ACCESS_KEY_ID}
      R2_SECRET_ACCESS_KEY: ${R2_SECRET_ACCESS_KEY}
      R2_BUCKET_NAME: ${R2_BUCKET_NAME}
      # Local proxy configuration (optional)
      USE_LOCAL_PROXY: ${USE_LOCAL_PROXY:-false}
      LOCAL_PROXY_URL: ${LOCAL_PROXY_URL:-http://host.docker.internal:8045/v1}
      LOCAL_PROXY_KEY: ${LOCAL_PROXY_KEY}
      LOCAL_PROXY_MODEL: ${LOCAL_PROXY_MODEL:-gemini-3.1-pro-high}
      # CRS Provider configuration
      USE_CRS_PROVIDER: ${USE_CRS_PROVIDER:-false}
      CRS_BASE_URL: ${CRS_BASE_URL}
      CRS_API_KEY: ${CRS_API_KEY}
      CRS_MODEL: ${CRS_MODEL:-gpt-5.4}
      CRS_REASONING_EFFORT: ${CRS_REASONING_EFFORT:-xhigh}
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    volumes:
      - ./uploads:/app/public/uploads

  inngest:
    image: node:20-alpine
    container_name: ai-practice-inngest
    working_dir: /app
    command: >
      sh -c "npx --yes inngest-cli@latest dev -u http://app:3001/api/inngest -p 8288"
    ports:
      - "8288:8288"
    depends_on:
      app:
        condition: service_started
    restart: unless-stopped

  backup:
    image: postgres:15-alpine
    container_name: ai-practice-backup
    environment:
      PGUSER: ai_practice
      PGPASSWORD: ${POSTGRES_PASSWORD:-practice123}
      PGDATABASE: ai_practice
      DB_HOST: postgres
    volumes:
      - ./scripts/db-backup.sh:/backup.sh:ro
      - ./backups:/backups
    entrypoint: /bin/sh
    command: >
      -c "chmod +x /backup.sh && echo '0 3 * * * /backup.sh' | crontab - && crond -f -l 2"
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

volumes:
  postgres_data:
