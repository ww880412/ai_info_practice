services:
  postgres:
    image: postgres:15-alpine
    container_name: ai-practice-postgres
    ports:
      - "5433:5432"
    environment:
      POSTGRES_DB: ai_practice
      POSTGRES_USER: ai_practice
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-practice123}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ai_practice"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ai-practice-app
    ports:
      - "3001:3001"
    environment:
      DATABASE_URL: postgresql://ai_practice:${POSTGRES_PASSWORD:-practice123}@postgres:5432/ai_practice?schema=public
      GEMINI_API_KEY: ${GEMINI_API_KEY}
      GEMINI_MODEL: ${GEMINI_MODEL:-gemini-3-flash-preview}
      NEXT_PUBLIC_APP_URL: http://localhost:3001
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    volumes:
      - ./uploads:/app/public/uploads

volumes:
  postgres_data:
